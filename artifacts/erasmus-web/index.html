<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Erasmus+ Platform</title>
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Erasmus+ Platform" />
    <meta property="og:title" content="Erasmus+ Platform" />
    <meta property="og:description" content="Plataforma de movilidades Erasmus+ — descubre intercambios, actividades y socios internacionales." />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Erasmus+ Platform" />
    <meta name="twitter:description" content="Plataforma de movilidades Erasmus+ — descubre intercambios, actividades y socios internacionales." />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Hide GT toolbar at all times — we provide our own language selector -->
    <style>
      .goog-te-banner-frame, .skiptranslate, #goog-gt-tt,
      .goog-tooltip, .goog-te-balloon-frame { display: none !important; }
      body { top: 0 !important; }
    </style>
    <!-- Google Translate widget: autoDisplay:false = GT does NOT auto-translate.
         Language is applied programmatically by LanguageSelector via the combo element.
         IMPORTANT: GT persists its own `googtrans` cookie across reloads, independently
         of our localStorage. If we don't clear it when no language is saved, GT will
         silently re-translate the page on the next load while our selector still says
         "Español". So: before GT loads, sync up the cookie with our localStorage. -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('sea_lang');
          if (!saved || saved === 'es') {
            // Clear googtrans cookie on every plausible domain/path combination.
            var host = location.hostname;
            var parts = host.split('.');
            var domains = ['', host, '.' + host];
            for (var i = 1; i < parts.length; i++) {
              domains.push('.' + parts.slice(i).join('.'));
            }
            var paths = ['/', location.pathname];
            var names = ['googtrans', 'GOOGTRANS'];
            for (var n = 0; n < names.length; n++) {
              for (var p = 0; p < paths.length; p++) {
                for (var d = 0; d < domains.length; d++) {
                  document.cookie = names[n] + '=; expires=Thu, 01 Jan 1970 00:00:00 GMT; path=' + paths[p] + (domains[d] ? '; domain=' + domains[d] : '');
                }
              }
            }
          } else {
            // Pre-set the cookie so GT applies the saved language on first paint
            // (avoids the brief Spanish flash before LanguageSelector runs).
            document.cookie = 'googtrans=/es/' + saved + '; path=/';
          }
        } catch (e) { /* localStorage may be unavailable in some embeds */ }
      })();
      window.googleTranslateElementInit = function () {
        new window.google.translate.TranslateElement(
          { pageLanguage: 'es', includedLanguages: 'tr,lv,ro,pt,mk,fr,it,de,pl,el,nl,hr,bg,hu,cs,sk,sl,et,lt,fi,sv,da,no,en,ga,sq,sr,uk,ru,ca,eu,gl', autoDisplay: false },
          'google_translate_element'
        );
      };
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit" async></script>
  </head>
  <body>
    <!-- Hidden GT widget anchor — LanguageSelector drives it via the combo element -->
    <div id="google_translate_element" style="display:none;position:absolute;"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
